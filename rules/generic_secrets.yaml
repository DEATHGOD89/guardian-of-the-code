rules:
  - id: "SEC001"
    name: "AWS Access Key ID"
    severity: "CRITICAL"
    description: "Found an AWS Access Key ID, which could lead to cloud environment compromise"
    remediation: "Use IAM roles or a secrets manager like AWS Secrets Manager"
    languages: ["*"]
    patterns:
      - regex: 'AKIA[0-9A-Z]{16}'

  - id: "SEC002"
    name: "Generic API Key/Token"
    severity: "CRITICAL"
    description: "Found a possible API key or token hardcoded in source"
    remediation: "Move secrets to environment variables or secret management tools"
    languages: ["*"]
    patterns:
      - regex: '(?i)(api_key|apikey|secret|token|password|auth_key)\s*[:=]\s*["''][a-zA-Z0-9\-_]{16,}["'']'
