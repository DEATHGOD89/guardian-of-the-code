rules:
  - id: "JS001"
    name: "Dangerous eval() usage"
    severity: "HIGH"
    description: "Using eval() can lead to arbitrary code execution"
    remediation: "Avoid using eval() or use safer alternatives like JSON.parse"
    languages: ["javascript", "ts"]
    patterns:
      - regex: 'eval\('
      - keywords: ["eval("]

  - id: "JS002"
    name: "Console.log left in code"
    severity: "LOW"
    description: "Leftover console logs can leak information or clutter logs"
    remediation: "Remove console.log or use a proper logging framework"
    languages: ["javascript", "ts"]
    patterns:
      - regex: 'console\.log\('
      - keywords: ["console.log("]

  - id: "JS003"
    name: "Unsafe innerHTML"
    severity: "HIGH"
    description: "Assigning values directly to innerHTML can cause XSS"
    remediation: "Use textContent or DOMPurify"
    languages: ["javascript", "ts", "html"]
    patterns:
      - regex: '\.innerHTML\s*='
      - keywords: [".innerHTML ="]
