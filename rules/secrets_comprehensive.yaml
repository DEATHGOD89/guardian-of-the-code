rules:
  - id: SEC001
    name: "AWS Access Key"
    severity: "CRITICAL"
    languages: ["*"]
    patterns:
      - regex: 'AKIA[0-9A-Z]{16}'
  - id: SEC002
    name: "Private RSA key"
    patterns:
      - regex: '-----BEGIN RSA PRIVATE KEY-----'
  - id: SEC003
    name: "Slack token"
    patterns:
      - regex: 'xox[baprs]-[0-9A-Za-z-]{10,48}'
  - id: SEC004
    name: "Generic password assignment"
    patterns:
      - regex: '(?i)(password|passwd|pwd)\s*=\s*["\'][^"\']{4,}["\']'